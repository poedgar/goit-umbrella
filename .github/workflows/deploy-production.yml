name: Deploy WordPress Theme – Production

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production           # ← enables protection rules, approvals, etc.

    steps:
      - name: Deploy to VPS (Production)
        uses: appleboy/ssh-action@v1.2.5
        with:
          host: ${{ secrets.HOSTINGER_HOST_PROD }}       # ← use separate secrets if possible
          username: ${{ secrets.HOSTINGER_USERNAME_PROD }}
          key: ${{ secrets.SSH_PRIVATE_KEY_PROD }}
          # port: 22
          script: |
            echo "🚀 Starting WordPress theme deployment to PRODUCTION..."

            THEME_DIR="/home/user/htdocs/bettered.global/wp-content/themes/goit-umbrella"

            cd "$THEME_DIR" || { echo "❌ Theme directory not found!"; exit 1; }

            mkdir -p ~/.ssh
            ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null

            echo "🔄 Pulling latest from origin/main..."
            git fetch origin
            git reset --hard origin/main
            git clean -fd

            echo "📦 Installing NPM dependencies..."
            rm -rf node_modules
            npm ci --no-audit --loglevel=error

            echo "📦 Installing Composer dependencies..."
            COMPOSER_ALLOW_SUPERUSER=1 composer install --no-dev --prefer-dist --no-progress --no-interaction

            echo "🏗 Building theme..."
            npm run build

            echo "🔧 Fixing permissions..."
            find . -type d -exec chmod 755 {} \;
            find . -type f -exec chmod 644 {} \;

            echo "🎉 PRODUCTION deployment completed at $(date '+%Y-%m-%d %H:%M:%S')"